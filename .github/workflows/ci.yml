name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend test and package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn test -B

      - name: Package backend
        run: mvn package -DskipTests -B

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-end
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      DB_USERNAME: postgres
      DB_PASSWORD: ci_postgres_password
      DB_NAME: eventflow
      JWT_SECRET: ci_jwt_secret_64_chars_minimum_value_for_validation_only_1234567890
      TELEGRAM_BOT_TOKEN: ""
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      MAIL_FROM: ""
      APP_FRONTEND_URL: http://localhost
      OPENAPI_SERVER_URL: http://localhost:8080
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Build backend image
        run: docker build -t eventflow-backend:ci ./back-end

      - name: Build frontend image
        run: docker build -t eventflow-frontend:ci ./front-end
