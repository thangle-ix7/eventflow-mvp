name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      healthcheck_url:
        description: Public URL to smoke check after deploy
        required: true
        default: https://event-flow.example.com

permissions:
  contents: read

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  verify:
    name: Verify before deploy
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/eventflow_deploy_key
          chmod 600 ~/.ssh/eventflow_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/eventflow' }}
        run: |
          ssh -i ~/.ssh/eventflow_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -eu
            cd '$VPS_APP_DIR'
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main
            sh deploy/scripts/deploy.sh
          "

      - name: Smoke check
        env:
          HEALTHCHECK_URL: ${{ inputs.healthcheck_url }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/eventflow' }}
        run: |
          ssh -i ~/.ssh/eventflow_deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "
            set -eu
            cd '$VPS_APP_DIR'
            sh deploy/scripts/healthcheck.sh '$HEALTHCHECK_URL'
          "
