services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eventflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-eventflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-eventflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: eventflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-eventflow}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SERVER_PORT: 8080
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_LINK_TOKEN_TTL_MINUTES: ${TELEGRAM_LINK_TOKEN_TTL_MINUTES:-10}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-${MAIL_USERNAME:-}}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      OPENAPI_SERVER_URL: ${OPENAPI_SERVER_URL:-http://localhost:8080}
      AUTH_EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: ${AUTH_EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-1440}
      AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES: ${AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
      AUTH_MAX_FAILED_LOGIN_ATTEMPTS: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:-5}
      AUTH_LOCKOUT_MINUTES: ${AUTH_LOCKOUT_MINUTES:-15}
      AUTH_REQUIRE_EMAIL_DELIVERY: ${AUTH_REQUIRE_EMAIL_DELIVERY:-false}
      AUDIT_LOGGING_ENABLED: ${AUDIT_LOGGING_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_AUTH_PER_MINUTE: ${RATE_LIMIT_AUTH_PER_MINUTE:-20}
      RATE_LIMIT_READ_PER_MINUTE: ${RATE_LIMIT_READ_PER_MINUTE:-300}
      RATE_LIMIT_WRITE_PER_MINUTE: ${RATE_LIMIT_WRITE_PER_MINUTE:-120}
      RATE_LIMIT_WEBHOOK_PER_MINUTE: ${RATE_LIMIT_WEBHOOK_PER_MINUTE:-120}
      ABUSE_PROTECTION_ENABLED: ${ABUSE_PROTECTION_ENABLED:-true}
      ABUSE_MAX_URI_LENGTH: ${ABUSE_MAX_URI_LENGTH:-2048}
      ABUSE_MAX_QUERY_LENGTH: ${ABUSE_MAX_QUERY_LENGTH:-4096}
      ABUSE_MAX_HEADER_LENGTH: ${ABUSE_MAX_HEADER_LENGTH:-8192}
      ABUSE_MAX_CONTENT_LENGTH_BYTES: ${ABUSE_MAX_CONTENT_LENGTH_BYTES:-1048576}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: eventflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
