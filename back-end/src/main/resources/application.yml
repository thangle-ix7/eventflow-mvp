spring:
  application:
    name: eventflow-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
  link-token:
    ttl-minutes: ${TELEGRAM_LINK_TOKEN_TTL_MINUTES:10}

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

eventflow:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  auth:
    email-verification-token-ttl-minutes: ${AUTH_EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:1440}
    password-reset-token-ttl-minutes: ${AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    max-failed-login-attempts: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:5}
    lockout-minutes: ${AUTH_LOCKOUT_MINUTES:15}
    require-email-delivery: ${AUTH_REQUIRE_EMAIL_DELIVERY:false}
  dev:
    seed-enabled: ${EVENTFLOW_DEV_SEED_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
