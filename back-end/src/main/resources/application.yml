spring:
  application:
    name: eventflow-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
  link-token:
    ttl-minutes: ${TELEGRAM_LINK_TOKEN_TTL_MINUTES:10}

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

eventflow:
  dev:
    seed-enabled: ${EVENTFLOW_DEV_SEED_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
