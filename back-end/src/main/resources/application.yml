spring:
  application:
    name: eventflow-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
          ssl:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
  link-token:
    ttl-minutes: ${TELEGRAM_LINK_TOKEN_TTL_MINUTES:10}

jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

eventflow:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}
  backend-url: ${APP_BACKEND_URL:http://localhost:8080}
  payment:
    payos:
      enabled: ${PAYOS_ENABLED:false}
      base-url: ${PAYOS_BASE_URL:https://api-merchant.payos.vn}
      client-id: ${PAYOS_CLIENT_ID:}
      api-key: ${PAYOS_API_KEY:}
      checksum-key: ${PAYOS_CHECKSUM_KEY:}
      expire-minutes: ${PAYOS_EXPIRE_MINUTES:15}
  openapi:
    server-url: ${OPENAPI_SERVER_URL:/}
  bootstrap-admin:
    enabled: ${EVENTFLOW_BOOTSTRAP_ADMIN_ENABLED:false}
    email: ${EVENTFLOW_BOOTSTRAP_ADMIN_EMAIL:}
    password: ${EVENTFLOW_BOOTSTRAP_ADMIN_PASSWORD:}
    name: ${EVENTFLOW_BOOTSTRAP_ADMIN_NAME:EventFlow Admin}
  security:
    audit:
      enabled: ${AUDIT_LOGGING_ENABLED:true}
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}
      window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
      auth-per-minute: ${RATE_LIMIT_AUTH_PER_MINUTE:20}
      read-per-minute: ${RATE_LIMIT_READ_PER_MINUTE:300}
      write-per-minute: ${RATE_LIMIT_WRITE_PER_MINUTE:120}
      webhook-per-minute: ${RATE_LIMIT_WEBHOOK_PER_MINUTE:120}
    abuse-protection:
      enabled: ${ABUSE_PROTECTION_ENABLED:true}
      max-uri-length: ${ABUSE_MAX_URI_LENGTH:2048}
      max-query-length: ${ABUSE_MAX_QUERY_LENGTH:4096}
      max-header-length: ${ABUSE_MAX_HEADER_LENGTH:8192}
      max-content-length-bytes: ${ABUSE_MAX_CONTENT_LENGTH_BYTES:1048576}
  auth:
    email-verification-token-ttl-minutes: ${AUTH_EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:1440}
    password-reset-token-ttl-minutes: ${AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
    max-failed-login-attempts: ${AUTH_MAX_FAILED_LOGIN_ATTEMPTS:5}
    lockout-minutes: ${AUTH_LOCKOUT_MINUTES:15}
    require-email-delivery: ${AUTH_REQUIRE_EMAIL_DELIVERY:false}
  invitation:
    token-ttl-minutes: ${EVENT_INVITATION_TOKEN_TTL_MINUTES:10080}
  upload:
    task-report-dir: ${TASK_REPORT_UPLOAD_DIR:uploads/task-reports}
  storage:
    supabase:
      enabled: ${SUPABASE_STORAGE_ENABLED:false}
      endpoint: ${SUPABASE_STORAGE_ENDPOINT:}
      region: ${SUPABASE_STORAGE_REGION:}
      access-key: ${SUPABASE_STORAGE_ACCESS_KEY:}
      secret-key: ${SUPABASE_STORAGE_SECRET_KEY:}
      bucket: ${SUPABASE_STORAGE_BUCKET:}
  dev:
    seed-enabled: ${EVENTFLOW_DEV_SEED_ENABLED:false}
  ai:
    openai:
      api-key: ${AI_API_KEY:${OPENAI_API_KEY:}}
      model: ${AI_MODEL_NAME:${OPENAI_MODEL:llama-3.3-70b-versatile}}
      api-url: ${AI_API_URL:https://api.groq.com/openai/v1/chat/completions}
      enabled: ${AI_ASSISTANT_OPENAI_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
