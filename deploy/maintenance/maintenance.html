<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EventFlow dang bao tri</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
        border: 1px solid #dbe4ef;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 20px 45px rgb(15 23 42 / 0.08);
        padding: 32px;
      }

      .brand {
        margin: 0 0 20px;
        font-size: 14px;
        font-weight: 800;
        color: #4f46e5;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 38px);
        line-height: 1.1;
      }

      p {
        margin: 16px 0 0;
        color: #475569;
        font-size: 16px;
        line-height: 1.7;
      }

      .status {
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #4f46e5;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">EventFlow</p>
      <h1>He thong dang bao tri</h1>
      <p>
        EventFlow dang duoc cap nhat de cai thien hieu nang va do on dinh.
        Vui long quay lai sau it phut. Cac thong bao deadline da tao se duoc xu ly
        lai khi he thong hoat dong binh thuong.
      </p>
      <div class="status">
        <span class="dot"></span>
        Dang cap nhat he thong
      </div>
    </main>
  </body>
</html>
